backend:
  name: github
  repo: thamswork/curatedandco
  branch: main
  base_url: https://cms-oauth.tyme-sak.workers.dev

media_folder: public/images
public_folder: /images

collections:
  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Home Page"
        file: "src/content/home.json"
        fields:
          - { label: "Hero Video URL", name: "heroVideo", widget: "string", required: false, hint: "Paste Cloudinary video URL" }
          - { label: "Hero Image URL", name: "heroImage", widget: "string", required: false, hint: "Paste Cloudinary image URL" }
          - { label: "Brand Story", name: "brandStory", widget: "text" }
          - { label: "Berwick CTA URL", name: "ctaUrl", widget: "string", default: "https://curatedandcobkk.com/product-category/brands/berwick/" }
