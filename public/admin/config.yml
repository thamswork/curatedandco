backend:
  name: github
  repo: thamswork/curatedandco
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Home Page"
        file: "src/content/home.json"
        fields:
          - { label: "Hero Title", name: "heroTitle", widget: "string" }
          - { label: "Hero Subtitle", name: "heroSubtitle", widget: "string" }
          - { label: "Hero Image URL", name: "heroImage", widget: "string", hint: "Paste Cloudinary image URL" }
          - { label: "Hero Video URL", name: "heroVideo", widget: "string", required: false, hint: "Paste Cloudinary video URL" }
          - { label: "Brand Story", name: "brandStory", widget: "text" }
          - { label: "CTA Button Text", name: "ctaText", widget: "string", default: "Shop Now" }
          - { label: "CTA Button URL", name: "ctaUrl", widget: "string" }
